name: Deploy Observability

on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::882352060841:role/GitHubActionsRole

      - name: Deploy Stacks
        run: |
          aws cloudformation deploy --template-file cfn/main.yaml --stack-name observability-stack --capabilities CAPABILITY_IAM
          aws cloudformation deploy --template-file cfn/monitoring-resources.yaml --stack-name observability-extensions --capabilities CAPABILITY_IAM

      - name: Configure Grafana
        run: |
          # 1. Isolated CLI Sandbox: Install to local workspace
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          ./aws/install -i "$PWD/aws-cli-v2" -b "$PWD/bin"
          
          # 2. Force local binary usage by prepending to PATH
          export PATH="$PWD/bin:$PATH"
          
          # 3. Fetch Workspace ID
          WS_ID=$(aws cloudformation describe-stacks --stack-name observability-stack --query 'Stacks[0].Outputs[?OutputKey==`WorkspaceId`].OutputValue' --output text)
          
          # 4. Idempotent API Configuration
          # We check if resources exist or rely on the API's graceful error handling
          aws grafana create-workspace-data-source \
            --workspace-id "$WS_ID" \
            --data-source-type "AMAZON_CLOUDWATCH" \
            --name "CloudWatch-Data" || echo "Data source already configured"
            
          aws grafana create-dashboard \
            --workspace-id "$WS_ID" \
            --definition "file://dashboards/business-metrics.json"
