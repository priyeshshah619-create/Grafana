name: Deploy Observability
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1 # Change this to your preferred region
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Deploy CFN Stack
        run: |
          aws cloudformation deploy \
            --template-file cfn/main.yaml \
            --stack-name observability-stack \
            --capabilities CAPABILITY_IAM \
            --region ${{ env.AWS_DEFAULT_REGION }}
      - name: Sync Dashboard
        run: |
          aws grafana create-dashboard \
            --workspace-id <WS_ID> \
            --definition file://dashboards/business-metrics.json \
            --region ${{ env.AWS_DEFAULT_REGION }}
