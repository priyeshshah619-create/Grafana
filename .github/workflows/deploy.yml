name: Deploy Observability
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy CFN Stack
        run: |
          aws cloudformation deploy \
            --template-file cfn/main.yaml \
            --stack-name observability-stack \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset

      - name: Sync Dashboard
        run: |
          # Fetch the WorkspaceId dynamically from the stack output
          WS_ID=$(aws cloudformation describe-stacks \
            --stack-name observability-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`WorkspaceId`].OutputValue' \
            --output text)

          echo "Syncing dashboard to Workspace: $WS_ID"
          aws grafana create-dashboard \
            --workspace-id $WS_ID \
            --definition file://dashboards/business-metrics.json
