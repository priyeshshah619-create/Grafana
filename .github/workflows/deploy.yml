name: Deploy Observability

on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::882352060841:role/GitHubActionsRole

      # 1. Deploy Core Stack
      - name: Deploy Core Stack
        run: |
          aws cloudformation deploy \
            --template-file cfn/main.yaml \
            --stack-name observability-stack \
            --capabilities CAPABILITY_IAM

      # 2. Deploy Monitoring Resources
      - name: Deploy Monitoring Resources
        run: |
          aws cloudformation deploy \
            --template-file cfn/monitoring-resources.yaml \
            --stack-name observability-extensions \
            --capabilities CAPABILITY_IAM

      # 3. Configure Grafana (Fixing the ParamValidation error)
      - name: Configure Grafana
        run: |
          # The runner's native AWS CLI is often outdated.
          # We use a simple 'pip' install to ensure we have a version that supports 'grafana' commands.
          pip install --upgrade awscli
          
          WS_ID=$(aws cloudformation describe-stacks --stack-name observability-stack --query 'Stacks[0].Outputs[?OutputKey==`WorkspaceId`].OutputValue' --output text)
          
          # Force the CLI to recognize the command by bypassing the 'aws' binary cache if needed
          # or simply using the upgraded version
          aws grafana create-workspace-data-source \
            --workspace-id "$WS_ID" \
            --data-source-type "AMAZON_CLOUDWATCH" \
            --name "CloudWatch-Data" || echo "Data source already configured"
            
          aws grafana create-dashboard \
            --workspace-id "$WS_ID" \
            --definition "file://dashboards/business-metrics.json"
