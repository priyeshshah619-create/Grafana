name: Deploy Observability
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::882352060841:role/GitHubActionsRole

      - name: Configure Observability (Data Source & Dashboard)
        run: |
          # Fetch the Workspace ID from your existing stack
          WS_ID=$(aws cloudformation describe-stacks --stack-name observability-stack --query 'Stacks[0].Outputs[?OutputKey==`WorkspaceId`].OutputValue' --output text)
          
          # Requirement 2 & 7: Register CloudWatch as Data Source
          # Using 'grafana' namespace which is standard across all CLI versions
          aws grafana create-workspace-data-source \
            --workspace-id $WS_ID \
            --data-source-type AMAZON_CLOUDWATCH \
            --name "CloudWatch-Data" || echo "Data source already exists"
          
          # Condition C: Dashboard as Code
          # 'put-dashboard' is safer/more reliable across versions than 'create-dashboard'
          aws grafana put-dashboard \
            --workspace-id $WS_ID \
            --dashboard-definition file://dashboards/business-metrics.json
