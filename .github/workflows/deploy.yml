name: Deploy Observability
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy CFN Stack
        run: |
          aws cloudformation deploy --template-file cfn/main.yaml --stack-name observability-stack --capabilities CAPABILITY_IAM
      - name: Sync Dashboard
        run: |
          # Use AWS CLI to push the JSON dashboard to Grafana
          aws grafana create-dashboard --workspace-id <WS_ID> --definition file://dashboards/business-metrics.json
