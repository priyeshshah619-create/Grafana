name: Deploy Observability Platform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: prod
  push:
    branches:
      - main
    paths:
      - iac/**
      - lambda/**
      - dashboards/**
      - alerts/**
      - otel/**
      - scripts/**
      - .github/workflows/deploy.yml

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  STACK_NAME: ${{ vars.STACK_NAME || 'managed-grafana-observability' }}
  ENVIRONMENT: ${{ inputs.environment || vars.ENVIRONMENT || 'prod' }}
  GRAFANA_PLUGINS: ${{ vars.GRAFANA_PLUGINS || 'grafana-clock-panel,yesoreyeram-infinity-datasource,volkovlabs-echarts-panel' }}

jobs:
  validate:
    name: Validate IaC and dashboard code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository artifacts
        shell: pwsh
        run: ./scripts/validate.ps1

  deploy-infrastructure:
    name: Deploy CloudFormation
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      grafana_endpoint: ${{ steps.export.outputs.grafana_endpoint }}
      workspace_id: ${{ steps.export.outputs.workspace_id }}
      alert_topic_arn: ${{ steps.export.outputs.alert_topic_arn }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package custom-resource lambdas
        run: bash ./scripts/package-lambdas.sh

      - name: Resolve account-scoped artifact bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ARTIFACT_BUCKET="${STACK_NAME}-${ACCOUNT_ID}-${AWS_REGION}-artifacts"
          echo "ARTIFACT_BUCKET=${ARTIFACT_BUCKET}" >> "$GITHUB_ENV"

      - name: Ensure artifact bucket
        run: |
          if [ "${AWS_REGION}" = "us-east-1" ]; then
            aws s3api create-bucket --bucket "${ARTIFACT_BUCKET}" --region "${AWS_REGION}" || true
          else
            aws s3api create-bucket \
              --bucket "${ARTIFACT_BUCKET}" \
              --region "${AWS_REGION}" \
              --create-bucket-configuration LocationConstraint="${AWS_REGION}" || true
          fi
          aws s3api put-bucket-encryption --bucket "${ARTIFACT_BUCKET}" --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          aws s3 sync dist/lambdas "s3://${ARTIFACT_BUCKET}/lambdas"

      - name: Deploy stack
        run: |
          aws cloudformation deploy \
            --stack-name "${STACK_NAME}" \
            --template-file iac/observability-platform.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              Environment="${ENVIRONMENT}" \
              ArtifactBucket="${ARTIFACT_BUCKET}" \
              GrafanaPluginIds="${GRAFANA_PLUGINS}" \
              SsoUserIds="${{ vars.SSO_USER_IDS }}" \
              SsoGroupIds="${{ vars.SSO_GROUP_IDS }}" \
              NotificationEmail="${{ vars.NOTIFICATION_EMAIL || 'priyesh.shah619@gmail.com' }}"

      - name: Export stack outputs
        id: export
        run: |
          set -euo pipefail

          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query "Stacks[0].Outputs" \
            --output json > outputs.json

          echo "RAW OUTPUTS:"
          cat outputs.json
                      
          GrafanaEndpoint=$(jq -r '.[] | select(.OutputKey=="GrafanaEndpoint") | .OutputValue // empty' outputs.json)
          GrafanaWorkspaceId=$(jq -r '.[] | select(.OutputKey=="GrafanaWorkspaceId") | .OutputValue' outputs.json)
          AlertTopicArn=$(jq -r '.[] | select(.OutputKey=="AlertTopicArn") | .OutputValue' outputs.json)

          echo "==== DEBUG PARSED VALUES ===="
          echo "GrafanaEndpoint=$GrafanaEndpoint"
          echo "GrafanaWorkspaceId=$GrafanaWorkspaceId"
          echo "AlertTopicArn=$AlertTopicArn"

          echo "grafana_endpoint=$GrafanaEndpoint" >> $GITHUB_OUTPUT
          echo "workspace_id=$GrafanaWorkspaceId" >> $GITHUB_OUTPUT
          echo "alert_topic_arn=$AlertTopicArn" >> $GITHUB_OUTPUT

          echo "DEBUG GrafanaEndpoint=$GrafanaEndpoint"
          echo "DEBUG SNS_ARN=$AlertTopicArn"

  deploy-dashboards-alerts:
    name: Deploy dashboard and alert code
    needs: deploy-infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve stack outputs
        id: stack
        run: |
          set -euo pipefail
          outputs=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query "Stacks[0].Outputs" \
            --output json)

          grafana_endpoint=$(echo "$outputs" | jq -r '.[] | select(.OutputKey=="GrafanaEndpoint") | .OutputValue')
          alert_topic_arn=$(echo "$outputs" | jq -r '.[] | select(.OutputKey=="AlertTopicArn") | .OutputValue')

          echo "grafana_endpoint=${grafana_endpoint}" >> "$GITHUB_OUTPUT"
          echo "alert_topic_arn=${alert_topic_arn}" >> "$GITHUB_OUTPUT"
      - name: Validate required outputs
        run: |
          test -n "${{ steps.stack.outputs.grafana_endpoint }}" || (echo "Missing GRAFANA_ENDPOINT" && exit 1)
          test -n "${{ steps.stack.outputs.alert_topic_arn }}" || (echo "Missing SNS_TOPIC_ARN" && exit 1)

      - name: Deploy CloudWatch dashboard
        run: |
          aws cloudwatch put-dashboard \
            --dashboard-name "${ENVIRONMENT}-business-observability" \
            --dashboard-body file://dashboards/cloudwatch.json

      - name: DEBUG - check outputs from previous job
        run: |
          echo "GRAFANA_ENDPOINT = '${{ steps.stack.outputs.grafana_endpoint }}'"
          echo "SNS_TOPIC_ARN = '${{ steps.stack.outputs.alert_topic_arn }}'"

      - name: Resolve Grafana service account token
        id: grafana
        run: |
          TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id "${STACK_NAME}/grafana/service-account-token" \
            --query SecretString \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Debug outputs from previous job
        run: |
          echo "GRAFANA_URL=${{ steps.stack.outputs.grafana_endpoint }}"
          echo "SNS_TOPIC_ARN=${{ steps.stack.outputs.alert_topic_arn }}"

      - name: Deploy Grafana dashboards and alerts
        env:
          GRAFANA_URL: ${{ steps.stack.outputs.grafana_endpoint }}
          GRAFANA_TOKEN: ${{ steps.grafana.outputs.token }}
          SNS_TOPIC_ARN: ${{ steps.stack.outputs.alert_topic_arn }}
        run: bash ./scripts/deploy-grafana-assets.sh






