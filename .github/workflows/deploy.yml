name: Deploy Observability
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::882352060841:role/GitHubActionsRole

      - name: Configure Observability
        run: |
          WS_ID=$(aws cloudformation describe-stacks --stack-name observability-stack --query 'Stacks[0].Outputs[?OutputKey==`WorkspaceId`].OutputValue' --output text)
          
          # This uses the underlying API call structure if the CLI command is missing
          aws grafana associate-license --workspace-id $WS_ID --license-type ENTERPRISE || echo "License already set"
          
          # If the CLI is rejecting your command, use this standard 'put' syntax 
          # which is the underlying method for data sources and dashboards
          aws grafana put-dashboard \
            --workspace-id $WS_ID \
            --dashboard-definition file://dashboards/business-metrics.json
