name: Deploy Observability

on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::882352060841:role/GitHubActionsRole

      - name: Deploy Stacks
        run: |
          aws cloudformation deploy --template-file cfn/main.yaml --stack-name observability-stack --capabilities CAPABILITY_IAM
          aws cloudformation deploy --template-file cfn/monitoring-resources.yaml --stack-name observability-extensions --capabilities CAPABILITY_IAM

      - name: Configure Grafana
        run: |
          WS_ID=$(aws cloudformation describe-stacks --stack-name observability-stack --query 'Stacks[0].Outputs[?OutputKey==`WorkspaceId`].OutputValue' --output text)
          
          # Force use of the Python module directly to bypass the 'aws' binary path issues
          python3 -m awscli grafana create-workspace-data-source \
            --workspace-id "$WS_ID" \
            --data-source-type "AMAZON_CLOUDWATCH" \
            --name "CloudWatch-Data" || echo "Data source already configured"
            
          python3 -m awscli grafana create-dashboard \
            --workspace-id "$WS_ID" \
            --definition "file://dashboards/business-metrics.json"
