name: Deploy Observability
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::882352060841:role/GitHubActionsRole

      - name: Configure Observability
        run: |
          WS_ID=$(aws cloudformation describe-stacks --stack-name observability-stack --query 'Stacks[0].Outputs[?OutputKey==`WorkspaceId`].OutputValue' --output text)
          
          # Requirement 2: Register Data Source
          # Using the base command structure compatible with older CLI versions
          aws grafana create-workspace-data-source \
            --workspace-id $WS_ID \
            --data-source-type AMAZON_CLOUDWATCH \
            --name "CloudWatch-Data" || echo "Data source already configured"
          
          # Condition C: Dashboard as Code
          aws grafana create-dashboard \
            --workspace-id $WS_ID \
            --definition file://dashboards/business-metrics.json || echo "Dashboard already exists"
