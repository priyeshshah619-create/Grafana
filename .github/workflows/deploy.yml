name: Deploy Observability
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::882352060841:role/GitHubActionsRole
      - name: Deploy Main Stack
        run: |
          aws cloudformation deploy --template-file cfn/main.yaml --stack-name observability-stack --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM
      - name: Wait for Grafana to be ready
        run: sleep 90
      - name: Configure Grafana Dashboards
        env:
          GRAFANA_URL: "https://g-d190288ff4.grafana-workspace.us-east-1.amazonaws.com"
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
        run: |
          DASHBOARD_JSON=$(cat dashboards/business-metrics.json)
          jq -n --argjson dash "$DASHBOARD_JSON" '{dashboard: $dash, overwrite: true}' > payload.json
          curl -s -X POST "$GRAFANA_URL/api/dashboards/db" -H "Authorization: Bearer $GRAFANA_TOKEN" -H "Content-Type: application/json" -d @payload.json
      - name: Configure Grafana Plugins
        env:
          GRAFANA_URL: "https://g-d190288ff4.grafana-workspace.us-east-1.amazonaws.com"
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
        run: |
          PAYLOAD='{"plugins": {"pluginAdminEnabled": true, "pluginIds": ["grafana-piechart-panel", "grafana-clock-panel"]}, "unifiedAlerting": {"enabled": true}}'
          curl -s -X POST "$GRAFANA_URL/api/admin/provisioning/plugins" -H "Authorization: Bearer $GRAFANA_TOKEN" -H "Content-Type: application/json" -d "$PAYLOAD"
