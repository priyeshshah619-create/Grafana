name: Deploy Observability Stack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Package and Deploy
        run: |
          # 1. Prepare Zip
          cd lambda/plugin-manager
          zip -r plugin-manager.zip .
          mv plugin-manager.zip ../../
          cd ../..
          
          # 2. Get Account ID to construct bucket name
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="grafana-deployment-bucket-$ACCOUNT_ID"
          
          # 3. Create bucket if it doesn't exist (handle first run)
          aws s3 mb s3://$BUCKET_NAME || true
          
          # 4. Upload to S3
          aws s3 cp plugin-manager.zip s3://$BUCKET_NAME/lambda/plugin-manager.zip
          
          # 5. Deploy
          aws cloudformation deploy \
            --template-file cloudformation/main-stack.yaml \
            --stack-name grafana-observability \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND
