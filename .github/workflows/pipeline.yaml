name: Deploy Observability Stack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Package and Deploy
        run: |
          # 1. Prepare
          rm -rf dist && mkdir -p dist/lambda
          cd lambda/plugin-manager && zip -r ../../dist/lambda/plugin-manager.zip . && cd ../..

          # 2. Generate a totally unique bucket name
          BUCKET_NAME="grafana-deploy-$(date +%s)"
          aws s3 mb s3://$BUCKET_NAME
          aws s3 cp dist/lambda/plugin-manager.zip s3://$BUCKET_NAME/lambda/plugin-manager.zip

          # 3. Deploy with the unique bucket name passed as a parameter
          aws cloudformation deploy \
            --template-file cloudformation/main-stack.yaml \
            --stack-name grafana-observability \
            --parameter-overrides S3BucketName=$BUCKET_NAME \
            --capabilities CAPABILITY_IAM
