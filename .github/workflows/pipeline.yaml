name: Deploy Observability Stack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Package and Deploy
        run: |
          # 1. Zip
          rm -rf dist && mkdir -p dist/lambda
          cd lambda/plugin-manager
          zip -r ../../dist/lambda/plugin-manager.zip .
          cd ../..
          
          # 2. Define Names
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="grafana-artifacts-v2-$ACCOUNT_ID-us-east-1"
          
          # 3. Create bucket if missing, then upload
          aws s3 mb s3://$BUCKET_NAME || true
          aws s3 cp dist/lambda/plugin-manager.zip s3://$BUCKET_NAME/lambda/plugin-manager.zip
          
          # 4. Deploy New Stack
          aws cloudformation deploy \
            --template-file cloudformation/main-stack.yaml \
            --stack-name grafana-observability-v2 \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND
