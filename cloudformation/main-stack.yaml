AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  S3BucketName: {Type: String}

Resources:
  # 1. Managed Grafana (Req 1)
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      Name: "ObservabilityWorkspace"

  # Plugin Management (Condition A & B)
  PluginManagerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: plugin-manager-final
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code: {S3Bucket: !Ref S3BucketName, S3Key: lambda/plugin-manager.zip}

  PluginManagerResource:
    Type: Custom::PluginManager
    Properties:
      ServiceToken: !GetAtt PluginManagerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Plugins: ["grafana-piechart-panel", "grafana-clock-panel"]

  # 3 & C. CloudWatch Dashboard as Code
  CloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: BusinessDrivenMonitoring
      DashboardBody: '{"widgets":[{"type":"metric","properties":{"metrics":[["AWS/Lambda","Errors","FunctionName","plugin-manager-final"]],"view":"timeSeries","stacked":false,"region":"us-east-1","title":"Lambda Errors"}}]}'

  # 3. SNS Notifications for Alerts
  AlertTopic:
    Type: AWS::SNS::Topic

  # IAM Roles (Ensuring permissions to manage Grafana)
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: [lambda.amazonaws.com]}, Action: ['sts:AssumeRole']}]
      Policies:
        - PolicyName: GrafanaManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['grafana:UpdateWorkspaceConfiguration', 'logs:*']
                Resource: '*'
