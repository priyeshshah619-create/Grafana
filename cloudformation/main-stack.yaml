Resources:
  # 1. The Deployment Bucket
  # Globally unique bucket name using Account ID and Region
  DeploymentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "grafana-artifacts-${AWS::AccountId}-${AWS::Region}"

  # 2. Amazon Managed Grafana Workspace
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED

  # 3. Lambda for Plugin Installation
  PluginManagerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: lambda/plugin-manager.zip
      Timeout: 300

  # 4. Custom Resource to trigger the plugin installation
  InstallPlugins:
    Type: Custom::GrafanaPlugin
    Properties:
      ServiceToken: !GetAtt PluginManagerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Plugins: ["grafana-piechart-panel", "redis-datasource"]
    DependsOn: GrafanaWorkspace  # Ensures the Workspace is ready first

  # 5. IAM Role for Lambda
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GrafanaAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - grafana:UpdateWorkspaceConfiguration
                  - grafana:DescribeWorkspace
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
