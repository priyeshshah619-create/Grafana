AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  S3BucketName:
    Type: String

Resources:
  # The Role for Grafana
  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [grafana.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGrafanaServiceRolePolicy

  # Grafana Workspace (SWITCHED TO CUSTOMER_MANAGED TO FIX VALIDATION ERROR)
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: CUSTOMER_MANAGED 
      WorkspaceRoleArn: !GetAtt GrafanaWorkspaceRole.Arn
      Name: ObservabilityWorkspace

  # Lambda Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [lambda.amazonaws.com]
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [grafana:UpdateWorkspaceConfiguration, grafana:DescribeWorkspaceConfiguration]
                Resource: !Sub 'arn:aws:grafana:${AWS::Region}:${AWS::AccountId}:/workspaces/*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  PluginManagerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: plugin-manager-final
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref S3BucketName
        S3Key: lambda/plugin-manager.zip

  PluginManagerResource:
    Type: Custom::PluginManager
    DependsOn: GrafanaWorkspace
    Properties:
      ServiceToken: !GetAtt PluginManagerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Plugins: [grafana-piechart-panel, grafana-clock-panel]

  CloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: BusinessDrivenMonitoring
      DashboardBody: '{"widgets":[{"type":"metric","properties":{"metrics":[["AWS/Lambda","Errors","FunctionName","plugin-manager-final"]],"view":"timeSeries","region":"us-east-1"}}]}'
