AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  S3BucketName: {Type: String}

Resources:
  # 1a. SSO Integration & Workspace Role (Required for real-world deployment)
  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: [grafana.amazonaws.com]}, Action: ['sts:AssumeRole']}]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGrafanaServiceRolePolicy

  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      WorkspaceRoleArn: !GetAtt GrafanaWorkspaceRole.Arn
      Name: "ObservabilityWorkspace"

  # 1b & Condition A: Plugin Installation Custom Resource
  PluginManagerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: plugin-manager-final
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code: {S3Bucket: !Ref S3BucketName, S3Key: lambda/plugin-manager.zip}

  PluginManagerResource:
    Type: Custom::PluginManager
    Properties:
      ServiceToken: !GetAtt PluginManagerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Plugins: ["grafana-piechart-panel", "grafana-clock-panel"]

  # 3 & Condition C: CloudWatch Dashboard as Code
  CloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: BusinessDrivenMonitoring
      DashboardBody: '{"widgets":[{"type":"metric","properties":{"metrics":[["AWS/Lambda","Errors","FunctionName","plugin-manager-final"]],"view":"timeSeries","region":"us-east-1"}}]}'

  # 3. Alerts & Notification Templates
  AlertTopic:
    Type: AWS::SNS::Topic

  # IAM Execution Roles
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: [lambda.amazonaws.com]}, Action: ['sts:AssumeRole']}]
      Policies:
        - PolicyName: GrafanaManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['grafana:UpdateWorkspaceConfiguration', 'logs:*']
                Resource: '*'
