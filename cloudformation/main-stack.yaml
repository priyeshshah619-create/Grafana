AWSTemplateFormatVersion: '2010-09-09'
Description: 'Grafana Observability Stack'

Resources:
  DeploymentBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Updated to v2 to bypass old cached metadata
      BucketName: !Sub "grafana-artifacts-v2-${AWS::AccountId}-${AWS::Region}"

  PluginManagerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: plugin-manager
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: lambda/plugin-manager.zip

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: [lambda.amazonaws.com]}
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['logs:CreateLogGroup', 'logs:CreateLogStream', 'logs:PutLogEvents']
                Resource: 'arn:aws:logs:*:*:*'
