AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  WorkspaceIdParam:
    Type: String
    Description: "The ID of the Managed Grafana Workspace"

Resources:
  # Self-contained IAM Role
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - "grafana:UpdateWorkspaceConfiguration"
                  - "grafana:DescribeWorkspaceConfiguration"
                Resource: "*"

  # Plugin Installer Function
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3, cfnresponse, json
          client = boto3.client('grafana')
          def lambda_handler(event, context):
              if event['RequestType'] == 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return
              try:
                  client.update_workspace_configuration(
                      workspaceId=event['ResourceProperties']['WorkspaceId'],
                      configuration=json.dumps({"plugins": {"pluginIds": ["grafana-clock-panel", "grafana-piechart-panel"]}})
                  )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Reason": str(e)})

  # Custom Resource using parameter
  PluginInstaller:
    Type: Custom::GrafanaPlugin
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref WorkspaceIdParam

  # SNS Resources
  AlertSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: GrafanaAlertNotifications

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref AlertSNSTopic
      Endpoint: "priyesh.shah619@gmail.com"

  # CloudWatch Alarm
  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "High-Latency-Business-Alert"
      MetricName: "Latency"
      Namespace: "BusinessMetrics"
      Statistic: "Average"
      Period: 300
      EvaluationPeriods: 1
      Threshold: 500
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: [!Ref AlertSNSTopic]
