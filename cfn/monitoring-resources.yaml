AWSTemplateFormatVersion: '2010-09-09'
Resources:
  # Plugin Installer Lambda
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaRole.Arn
      Code:
        # Note: In CI/CD, you can use S3 or inline. For simplicity:
        ZipFile: |
          # Paste content of plugin-installer.py here
  
  PluginInstaller:
    Type: Custom::GrafanaPlugin
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !ImportValue WorkspaceId # Ensure main.yaml exports this

  # SNS Setup (Managed)
  AlertSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: GrafanaAlertNotifications

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref AlertSNSTopic
      Endpoint: "priyesh.shah619@gmail.com" # Replace with your email

  # Existing Alarm...
  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmActions: [!Ref AlertSNSTopic]
      # ... rest of your alarm props
