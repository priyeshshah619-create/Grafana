AWSTemplateFormatVersion: '2010-09-09'
Description: 'Observability Stack - Alerting and Notifications'
Resources:
  AlertSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: GrafanaAlertNotifications
  
  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: HighLatencyBusinessImpact
      MetricName: Latency
      Namespace: BusinessMetrics
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 500
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertSNSTopic
