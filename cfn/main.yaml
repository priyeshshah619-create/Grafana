AWSTemplateFormatVersion: '2010-09-09'
Description: 'Observability Stack with Plugin Automation'

Resources:
  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GrafanaWorkspaceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: [grafana.amazonaws.com, lambda.amazonaws.com]}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['grafana:UpdateWorkspaceConfiguration', 'logs:CreateLogGroup', 'logs:CreateLogStream', 'logs:PutLogEvents']
                Resource: '*'

  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      Name: enterprise-observability
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      RoleArn: !GetAtt GrafanaWorkspaceRole.Arn

  PluginUpdaterFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt GrafanaWorkspaceRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3, json, cfnresponse
          def lambda_handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  client = boto3.client('grafana')
                  client.update_workspace_configuration(
                      workspaceId=event['ResourceProperties']['WorkspaceId'],
                      configuration=json.dumps({"plugins": {"pluginAdminEnabled": True, "pluginIds": ["grafana-piechart-panel", "grafana-clock-panel"]}})
                  )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Error": str(e)})

  EnablePluginsCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt PluginUpdaterFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace

Outputs:
  GrafanaWorkspaceId:
    Value: !Ref GrafanaWorkspace
