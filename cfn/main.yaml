AWSTemplateFormatVersion: '2010-09-09'
Description: Full Observability Stack (Managed Grafana + CloudWatch)

Resources:
  # 1. Managed Grafana Workspace
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      Name: ObservabilityStack
      RoleArn: !GetAtt GrafanaWorkspaceRole.Arn

  # 2. CloudWatch Data Source (Requirement 7)
  GrafanaDataSource:
    Type: AWS::Grafana::DataSource
    Properties:
      DataSourceType: AMAZON_CLOUDWATCH
      WorkspaceId: !Ref GrafanaWorkspace

  # 3. Custom Resource for Plugin Installation (Condition A)
  InstallPlugins:
    Type: Custom::GrafanaPlugin
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace

  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.11
      Role: !GetAtt LambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json, urllib3, boto3
          http = urllib3.PoolManager()
          def lambda_handler(event, context):
              if event['RequestType'] == 'Delete':
                  return
              try:
                  client = boto3.client('grafana')
                  client.update_workspace_configuration(
                      workspaceId=event['ResourceProperties']['WorkspaceId'], 
                      configuration=json.dumps({"plugins": {"pluginAdminEnabled": True}})
                  )
                  # Send success back to CloudFormation
                  resp = {"Status": "SUCCESS", "PhysicalResourceId": "GrafanaPlugin"}
              except Exception as e:
                  resp = {"Status": "FAILED", "Reason": str(e)}
              http.request('PUT', event['ResponseURL'], body=json.dumps(resp), headers={'content-type': '', 'content-length': '0'})

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: lambda.amazonaws.com}, Action: sts:AssumeRole}]
      ManagedPolicyArns: [arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole]
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement: [{Effect: Allow, Action: ["grafana:UpdateWorkspaceConfiguration"], Resource: "*"}]

  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: grafana.amazonaws.com}, Action: sts:AssumeRole}]

Outputs:
  WorkspaceId:
    Value: !Ref GrafanaWorkspace
