AWSTemplateFormatVersion: '2010-09-09'
Description: Observability Stack with Managed Grafana and CloudWatch

Resources:
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      Name: ObservabilityStack
      RoleArn: !GetAtt GrafanaWorkspaceRole.Arn

  InstallPlugins:
    Type: Custom::GrafanaPlugin
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace

  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.11
      Role: !GetAtt LambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json, urllib3, boto3
          http = urllib3.PoolManager()
          def lambda_handler(event, context):
              response_url = event['ResponseURL']
              response_body = {
                  "Status": "SUCCESS", "Reason": "Configured", "PhysicalResourceId": "GrafanaPlugin",
                  "StackId": event['StackId'], "RequestId": event['RequestId'], "LogicalResourceId": event['LogicalResourceId']
              }
              if event['RequestType'] != 'Delete':
                  try:
                      client = boto3.client('grafana')
                      client.update_workspace_configuration(
                          workspaceId=event['ResourceProperties']['WorkspaceId'],
                          configuration=json.dumps({"plugins": {"pluginAdminEnabled": True}})
                      )
                  except Exception as e:
                      response_body.update({"Status": "FAILED", "Reason": str(e)})
              
              encoded_body = json.dumps(response_body).encode('utf-8')
              http.request('PUT', response_url, body=encoded_body, headers={'content-type': '', 'content-length': str(len(encoded_body))})

  # ... (existing content above)

  CustomPluginResource:
    Type: Custom::GrafanaPlugins
    DependsOn: GrafanaWorkspace
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace

  BusinessDashboard:
    Type: AWS::Grafana::Dashboard
    Properties:
      WorkspaceId: !Ref GrafanaWorkspace
      DashboardData: >
        {
          "dashboard": {
            "title": "Business Metrics Dashboard",
            "uid": "business-metrics-001",
            "schemaVersion": 35,
            "panels": [
              {
                "type": "graph",
                "title": "Latency",
                "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
                "targets": [{ "refId": "A", "expr": "rate(http_requests_total[5m])" }]
              }
            ]
          }
        }
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: lambda.amazonaws.com}, Action: sts:AssumeRole}]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement: [{Effect: Allow, Action: ["grafana:UpdateWorkspaceConfiguration"], Resource: "*"}]

  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: grafana.amazonaws.com}, Action: sts:AssumeRole}]

Outputs:
  WorkspaceId:
    Value: !Ref GrafanaWorkspace
