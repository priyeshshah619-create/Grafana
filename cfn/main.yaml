AWSTemplateFormatVersion: '2010-09-09'
Description: Observability Stack with Managed Grafana and CloudWatch

Resources:
  # IAM Role for Grafana to access CloudWatch
  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: grafana.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GrafanaCloudWatchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - cloudwatch:Describe*
                  - cloudwatch:Get*
                  - cloudwatch:List*
                Resource: "*"

  # Managed Grafana Workspace (Satisfies Req 1 & 1a)
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      WorkspaceRoleArn: !GetAtt GrafanaWorkspaceRole.Arn
      Name: ObservabilityStack

  # SNS Topic for Grafana Alerts (Satisfies Req 3)
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: GrafanaAlerts

  # Lambda Function with Inline Code (Satisfies Condition A & B)
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          import boto3, json, cfnresponse
          grafana = boto3.client('managedgrafana')
          def handler(event, context):
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      workspace_id = event['ResourceProperties']['WorkspaceId']
                      plugins = event['ResourceProperties']['Plugins']
                      config = {"plugins": [{"pluginId": p} for p in plugins]}
                      grafana.update_workspace_configuration(workspaceId=workspace_id, configuration=json.dumps(config))
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  else:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(f"Error: {e}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  # Custom Resource to trigger plugin install (Satisfies Condition A)
  CustomPluginResource:
    Type: Custom::GrafanaPlugins
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Plugins: ["grafana-clock-panel", "grafana-piechart-panel"]

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement: [{Action: "sts:AssumeRole", Effect: Allow, Principal: {Service: lambda.amazonaws.com}}]
      Policies:
        - PolicyName: GrafanaPolicy
          PolicyDocument:
            Statement: [{Action: ["grafana:UpdateWorkspaceConfiguration", "logs:*", "cloudwatch:PutMetricData"], Effect: Allow, Resource: "*"}]

Outputs:
  WorkspaceId:
    Description: The ID of the Grafana Workspace
    Value: !Ref GrafanaWorkspace
