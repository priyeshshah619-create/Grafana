AWSTemplateFormatVersion: '2010-09-09'
Description: 'Full Observability Stack'

Resources:
  # 1. Managed Grafana Workspace
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      Name: ObservabilityStack
      RoleArn: !GetAtt GrafanaWorkspaceRole.Arn

  # 2. Plugin Installer Lambda (Condition A & B)
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3, cfnresponse, json
          client = boto3.client('grafana')
          def lambda_handler(event, context):
              if event['RequestType'] == 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return
              try:
                  workspace_id = event['ResourceProperties']['WorkspaceId']
                  config_payload = {
                      "plugins": {
                          "pluginAdminEnabled": True,
                          "pluginIds": ["grafana-piechart-panel", "grafana-clock-panel"]
                      },
                      "unifiedAlerting": {
                          "enabled": True
                      }
                  }
                  client.update_workspace_configuration(
                      workspaceId=workspace_id,
                      configuration=json.dumps(config_payload)
                  )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(f"CRITICAL ERROR: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Reason": str(e)})

  # 3. Custom Resource to Trigger Installation
  InstallPlugins:
    Type: Custom::GrafanaPlugin
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Version: "1.2" # Increment this to force Lambda re-execution
