AWSTemplateFormatVersion: '2010-09-09'
Description: Observability Stack with Managed Grafana and CloudWatch

Resources:
  # 1. Managed Grafana Workspace
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: SERVICE_MANAGED
      Name: ObservabilityStack
      RoleArn: !GetAtt GrafanaWorkspaceRole.Arn

  # 2. Custom Resource for Plugin Installation (Requirement 1 & Condition A)
  InstallPlugins:
    Type: Custom::GrafanaPlugin
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace

  # 3. Lambda for Plugin Installation (Condition B)
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.11
      Role: !GetAtt LambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json, urllib3, boto3
          http = urllib3.PoolManager()
          def lambda_handler(event, context):
              response_url = event['ResponseURL']
              response_data = {"Status": "SUCCESS", "Reason": "Plugin configured", "PhysicalResourceId": context.log_stream_name}
              try:
                  if event['RequestType'] != 'Delete':
                      client = boto3.client('grafana')
                      # Corrected JSON structure for Grafana 10.4
                      config = {"plugins": [{"pluginId": "grafana-clock-panel", "enabled": True}]}
                      client.update_workspace_configuration(
                          workspaceId=event['ResourceProperties']['WorkspaceId'],
                          configuration=json.dumps(config)
                      )
              except Exception as e:
                  response_data = {"Status": "FAILED", "Reason": str(e), "PhysicalResourceId": context.log_stream_name}
              
              json_data = json.dumps(response_data).encode('utf-8')
              http.request('PUT', response_url, body=json_data, headers={'content-type': '', 'content-length': str(len(json_data))})

  # IAM Roles
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: lambda.amazonaws.com}, Action: sts:AssumeRole}]
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement: [{Effect: Allow, Action: ["grafana:UpdateWorkspaceConfiguration"], Resource: "*"}]

  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: grafana.amazonaws.com}, Action: sts:AssumeRole}]

Outputs:
  WorkspaceId:
    Value: !Ref GrafanaWorkspace
