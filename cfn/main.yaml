AWSTemplateFormatVersion: '2010-09-09'
Description: 'Observability Stack with SNS Notifications and Plugin Automation'

Resources:
  AlertSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: Grafana-Alert-Topic

  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GrafanaWorkspaceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: [grafana.amazonaws.com, lambda.amazonaws.com]}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - 'grafana:UpdateWorkspaceConfiguration'
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                  - 'sns:Publish'
                  - 'cloudwatch:PutDashboard'
                Resource: '*'

  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      Name: enterprise-observability
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      RoleArn: !GetAtt GrafanaWorkspaceRole.Arn

  CloudWatchBusinessDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: Business-Metrics-Dashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "metrics": [ [ "BusinessMetrics/Application", "RequestCount" ] ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Application Request Count"
              }
            }
          ]
        }

  PluginUpdaterFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt GrafanaWorkspaceRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import boto3, json, urllib3
          http = urllib3.PoolManager()
          def cfn_send(event, context, status, data, reason=None):
              response_body = {
                  'Status': status,
                  'Reason': reason or "Success",
                  'PhysicalResourceId': event.get('PhysicalResourceId', 'GrafanaPluginConfig'),
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data
              }
              json_body = json.dumps(response_body)
              headers = {'content-type': '', 'content-length': str(len(json_body))}
              http.request('PUT', event['ResponseURL'], body=json_body, headers=headers)
          def lambda_handler(event, context):
              try:
                  if event['RequestType'] == 'Delete': cfn_send(event, context, 'SUCCESS', {}); return
                  client = boto3.client('grafana')
                  config = {"plugins": {"pluginAdminEnabled": True, "pluginIds": ["grafana-piechart-panel", "grafana-clock-panel"]}}
                  client.update_workspace_configuration(workspaceId=event['ResourceProperties']['WorkspaceId'], configuration=json.dumps(config))
                  cfn_send(event, context, 'SUCCESS', {"Status": "Finished"})
              except Exception as e:
                  cfn_send(event, context, 'FAILED', {"Error": str(e)}, reason=str(e))

  EnablePluginsCustomResource:
    Type: AWS::CloudFormation::CustomResource
    DependsOn: [GrafanaWorkspace, CloudWatchBusinessDashboard]
    Properties:
      ServiceToken: !GetAtt PluginUpdaterFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace

Outputs:
  GrafanaWorkspaceId:
    Value: !Ref GrafanaWorkspace
  SNSTopicArn:
    Value: !Ref AlertSNSTopic
