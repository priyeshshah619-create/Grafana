AWSTemplateFormatVersion: '2010-09-09'
Description: Observability Stack with Managed Grafana and CloudWatch

Resources:
  # 1. Managed Grafana Workspace
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      WorkspaceName: ObervabilityStack
      RoleARN: !GetAtt GrafanaWorkspaceRole.Arn

  # A. Custom Resource for Plugin Installation
  InstallPlugins:
    Type: Custom::GrafanaPlugin
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace

  # B. Lambda for Plugin Installation (Self-contained)
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.11
      Role: !GetAtt LambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json, urllib3, boto3
          http = urllib3.PoolManager()
          def lambda_handler(event, context):
              response_url = event['ResponseURL']
              response_body = {
                  "Status": "SUCCESS", 
                  "Reason": "Plugin configured", 
                  "PhysicalResourceId": context.log_stream_name,
                  "StackId": event['StackId'],
                  "RequestId": event['RequestId'],
                  "LogicalResourceId": event['LogicalResourceId']
              }
              try:
                  if event['RequestType'] != 'Delete':
                      client = boto3.client('grafana')
                      client.update_workspace_configuration(
                          workspaceId=event['ResourceProperties']['WorkspaceId'],
                          configuration=json.dumps({"plugins": [{"pluginId": "grafana-clock-panel"}]})
                      )
              except Exception as e:
                  print(f"Error: {e}")
                  response_body['Status'] = 'FAILED'
                  response_body['Reason'] = str(e)
              json_response = json.dumps(response_body).encode('utf-8')
              http.request('PUT', response_url, body=json_response, headers={'content-type': '', 'content-length': str(len(json_response))})

  # IAM Roles
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: lambda.amazonaws.com}, Action: sts:AssumeRole}]
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement: [{Effect: Allow, Action: ["grafana:UpdateWorkspaceConfiguration"], Resource: "*"}]

  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: grafana.amazonaws.com}, Action: sts:AssumeRole}]

Outputs:
  WorkspaceId:
    Value: !Ref GrafanaWorkspace
