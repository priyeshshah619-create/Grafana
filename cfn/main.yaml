AWSTemplateFormatVersion: '2010-09-09'
Resources:
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: ["AWS_SSO"]
      PermissionType: CUSTOMER_MANAGED
      Name: ObservabilityStack
      RoleArn: !GetAtt GrafanaWorkspaceRole.Arn

  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.11
      Role: !GetAtt LambdaRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import json, boto3, urllib.request
          def send(event, context, status, data):
              response = json.dumps({"Status": status, "PhysicalResourceId": "PluginInstaller", "StackId": event['StackId'], "RequestId": event['RequestId'], "LogicalResourceId": event['LogicalResourceId'], "Data": data}).encode('utf-8')
              req = urllib.request.Request(event['ResponseURL'], data=response, method='PUT', headers={'Content-Type': ''})
              with urllib.request.urlopen(req) as f: pass
          def lambda_handler(event, context):
              try:
                  if event['RequestType'] == 'Delete': send(event, context, "SUCCESS", {}); return
                  boto3.client('grafana').update_workspace_configuration(
                      workspaceId=event['ResourceProperties']['WorkspaceId'],
                      configuration=json.dumps({"plugins": [{"pluginId": "grafana-clock-panel"}]})
                  )
                  send(event, context, "SUCCESS", {"Message": "Plugin Installed"})
              except Exception as e:
                  send(event, context, "FAILED", {"Error": str(e)})

  # ... (existing content above)

  CustomPluginResource:
    Type: Custom::GrafanaPlugins
    DependsOn: GrafanaWorkspace
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace

  BusinessDashboard:
    Type: AWS::Grafana::Dashboard
    Properties:
      WorkspaceId: !Ref GrafanaWorkspace
      DashboardData: >
        {
          "dashboard": {
            "title": "Business Metrics Dashboard",
            "uid": "business-metrics-001",
            "schemaVersion": 35,
            "panels": [
              {
                "type": "graph",
                "title": "Latency",
                "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
                "targets": [{ "refId": "A", "expr": "rate(http_requests_total[5m])" }]
              }
            ]
          }
        }

Outputs:
  WorkspaceId:
    Value: !Ref GrafanaWorkspace
